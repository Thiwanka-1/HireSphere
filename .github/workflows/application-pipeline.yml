name: Application Service Pipeline

on:
  push:
    branches: [ "main", "master" ]
    paths: [ "application-service/**", "docker-compose.yml" ]
  pull_request:
    branches: [ "main", "master" ]
    paths: [ "application-service/**", "docker-compose.yml" ]

jobs:
  security-scan:
    name: Snyk SAST (Application)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        working-directory: ./application-service
        run: npm install
      - name: Run Snyk SAST
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects
          command: code test

  docker-build-push:
    name: Build & Push (Application)
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Application Service
        run: docker compose build application-service
      - name: Push Application Service
        run: docker compose push application-service
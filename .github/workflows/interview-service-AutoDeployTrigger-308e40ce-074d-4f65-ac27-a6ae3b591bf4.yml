name: Trigger auto deployment for interview-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/interview-service-AutoDeployTrigger-308e40ce-074d-4f65-ac27-a6ae3b591bf4.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.INTERVIEWSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.INTERVIEWSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.INTERVIEWSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/interview-service
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.INTERVIEWSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.INTERVIEWSERVICE_REGISTRY_PASSWORD }}
          containerAppName: interview-service
          resourceGroup: HireSphere-RG
          imageToBuild: gamithu/interview-service:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_



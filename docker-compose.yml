version: '3.8'

services:
  # ==========================================
  # 1. MICROSERVICES
  # ==========================================
  auth-service:
    build: ./auth-service
    image: gamithu/hiresphere-auth-service:latest
    container_name: auth_service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=development
      # Connects to Atlas and creates the 'HireSphere_Auth' database
      - MONGO_URI=${MONGO_ATLAS_BASE_URI}/HireSphere_Auth?appName=Cluster0
      - JWT_SECRET=super_secret_development_key_change_in_production
      # NEW: URLs for Cascading Deletes
      - JOB_SERVICE_URL=https://job-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io/api/jobs
      - APP_SERVICE_URL=https://application-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io/api/applications
      - INTERVIEW_SERVICE_URL=https://interview-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io/api/interviews

  job-service:
    build: ./job-service
    image: gamithu/hiresphere-job-service:latest
    container_name: job_service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - NODE_ENV=development
      # Connects to Atlas and creates the 'HireSphere_Job' database
      - MONGO_URI=${MONGO_ATLAS_BASE_URI}/HireSphere_Job?appName=Cluster0
      - JWT_SECRET=super_secret_development_key_change_in_production
      # NEW: URL for Cascading Delete
      - APP_SERVICE_URL=https://application-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io/api/applications

  application-service:
    build: ./application-service
    image: gamithu/hiresphere-application-service:latest
    container_name: application_service
    ports:
      - "5003:5003"
    depends_on:
      - job-service
    environment:
      - PORT=5003
      - NODE_ENV=development
      # Uses the exact Atlas database name you specified
      - MONGO_URI=${MONGO_ATLAS_BASE_URI}/HireSphere_Application?appName=Cluster0
      - JWT_SECRET=super_secret_development_key_change_in_production
      # Internal Docker DNS: Pointing to the Job Service container
      - JOB_SERVICE_URL=https://job-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io/api/jobs
      # Firebase Credentials
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
      - FIREBASE_APP_ID=${FIREBASE_APP_ID}

  interview-service:
    build: ./interview-service
    image: gamithu/hiresphere-interview-service:latest
    container_name: interview_service
    ports:
      - "5004:5004"
    depends_on:
      - auth-service
    environment:
      - PORT=5004
      - NODE_ENV=development
      # Connects to Atlas and creates the 'HireSphere_Interview' database
      - MONGO_URI=${MONGO_ATLAS_BASE_URI}/HireSphere_Interview?appName=Cluster0
      - JWT_SECRET=super_secret_development_key_change_in_production
      # Internal Docker DNS: Pointing to the Auth Service container
      - AUTH_SERVICE_URL=https://auth-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io/api/auth
      - APP_SERVICE_URL=https://application-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io # Used for status updates
      # Email Credentials
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}

  # ==========================================
  # 2. API GATEWAY
  # ==========================================
  api-gateway:
    build: ./api-gateway
    image: gamithu/hiresphere-api-gateway:latest
    container_name: api_gateway
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - job-service
      - application-service
      - interview-service
    environment:
      - PORT=5000
      - NODE_ENV=development
      # Tell the gateway where the containers are on the internal network
      - AUTH_SERVICE_URL=https://auth-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io
      - JOB_SERVICE_URL=https://job-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io
      - APP_SERVICE_URL=https://application-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io
      - INTERVIEW_SERVICE_URL=https://interview-service.internal.agreeablewave-5261b6ec.centralindia.azurecontainerapps.io